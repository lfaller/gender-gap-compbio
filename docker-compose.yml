version: '3.8'

services:
  gender-gap-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gender-gap-compbio
    image: gender-gap-compbio:latest

    # Environment variables
    environment:
      # Required: NCBI email (users should set this)
      NCBI_EMAIL: ${NCBI_EMAIL:-your.email@example.com}

      # Optional: NCBI API key (for higher rate limits)
      NCBI_API_KEY: ${NCBI_API_KEY:-}

      # Optional: Groq API key (for unknown name classification)
      GROQ_API_KEY: ${GROQ_API_KEY:-}

      # Python settings
      PYTHONUNBUFFERED: '1'

    # Volume mounts
    volumes:
      # Persistent storage for data
      - ./data:/app/data

      # Output directory
      - ./outputs:/app/outputs

      # Local directory for non-git files
      - ./local:/app/local

    # Working directory
    working_dir: /app

    # Default command (can be overridden)
    command: analyze

    # Stdin/stdout configuration
    stdin_open: true
    tty: true

    # Network
    networks:
      - analysis-network

networks:
  analysis-network:
    driver: bridge
